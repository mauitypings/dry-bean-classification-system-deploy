<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Login - Dry Bean Classification System</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/logo/logo.ico') }}">

    <style>
        body { font-family: 'Inter', sans-serif; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-white flex items-center justify-center min-h-screen antialiased selection:bg-green-500 selection:text-white">

    <!-- LOGIN CARD -->
    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-2xl border border-green-100">

        <!-- HEADER -->
        <div class="text-center mb-8">

            <div class="mx-auto h-12 w-12 bg-green-700 rounded-full flex items-center justify-center mb-4 shadow-lg shadow-green-200">

                <!-- Bean Icon -->
                🫘

            </div>

            <h2 class="text-2xl font-bold text-slate-900">
                Welcome Back
            </h2>

            <p class="text-slate-500 text-sm mt-2">
                Sign in to access the Dry Bean Classification System
            </p>

        </div>

        {% if error %}
        <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm">
            {{ error }}
        </div>
        {% endif %}

        {% include "partials/toasts.html" %}

        <!-- FORM -->
        <form id="auth-form" action="{{ url_for('auth.login') }}" method="POST" class="space-y-6">

            <!-- Username -->
            <div>
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-wider">
                    Username
                </label>

                <input name="username" type="text" required
                    placeholder="Enter your username"
                    value="{{ form.username if form else '' }}"
                    class="mt-1 block w-full px-4 py-3 bg-white border border-green-100 rounded-lg text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-green-600 transition">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-wider">
                    Password
                </label>

                <input name="password" type="password" required
                    placeholder="••••••••"
                    class="mt-1 block w-full px-4 py-3 bg-white border border-green-100 rounded-lg text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-green-600 transition">
            </div>

            <!-- Submit -->
            <button type="submit"
                class="w-full py-3 px-4 rounded-lg text-white font-medium bg-green-700 hover:bg-green-800 shadow-lg shadow-green-100 transition">
                Sign In
            </button>

        </form>

        <!-- GUEST -->
        <div class="mt-4">
            <a href="{{ url_for('auth.guest') }}"
               class="w-full flex justify-center py-3 px-4 border border-green-200 rounded-lg text-sm font-medium text-green-700 hover:bg-green-50 transition">
                Continue as Guest
            </a>
        </div>

        <!-- FOOTER -->
        <div class="mt-6 text-center">
            <p class="text-sm text-slate-500">
                Don't have an account?
                <a href="{{ url_for('auth.register_page') }}"
                   class="font-medium text-green-700 hover:text-green-800 transition">
                   Register here
                </a>
            </p>
        </div>

    </div>

</body>
</html>
