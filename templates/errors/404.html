<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50/50 flex items-center justify-center min-h-screen antialiased selection:bg-green-600 selection:text-white text-base md:text-lg relative overflow-hidden">

    <div class="absolute top-1/4 -left-20 w-80 h-80 bg-green-200/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-green-100/30 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-lg p-8 md:p-10 text-center relative z-10">
        
        <div class="relative mb-10">
            <div class="mx-auto h-28 w-28 bg-white rounded-2xl flex items-center justify-center border border-green-100 shadow-xl shadow-green-700/5 text-4xl">
                🫘
            </div>
            <div class="absolute -bottom-3 left-1/2 -translate-x-1/2 px-5 py-1.5 bg-green-700 rounded-full shadow-md shadow-green-700/20 border border-green-600/20">
                <span class="text-white font-bold text-xs tracking-wider uppercase">Page Not Found</span>
            </div>
        </div>

        <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">
            Oops! We're a Bit Lost
        </h1>
        <p class="text-slate-600 max-w-sm mx-auto mb-10 leading-relaxed text-sm md:text-base">
            The page you are looking for doesn't exist, or it might have been moved. Let's get you back to the right place on <span class="text-green-700 font-bold">ProBean AI</span>!
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">

            {% if session.get("username") or session.get("guest") %}
            
            <button onclick="window.history.back()" 
                    class="w-full sm:w-auto px-8 py-4 bg-slate-100 hover:bg-slate-200/80 text-slate-700 font-bold uppercase tracking-wider text-xs md:text-sm rounded-xl transition shadow-sm active:scale-95 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Go Back One Page
            </button>

            {% else %}

            <a href="{{ url_for('main.home') }}" 
               class="w-full sm:w-auto px-10 py-4 bg-green-700 hover:bg-green-800 text-white font-bold uppercase tracking-wider text-xs md:text-sm rounded-xl transition shadow-md shadow-green-700/10 active:scale-95 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Back to Home Page 🚀
            </a>

            {% endif %}

        </div>

    </div>

</body>
</html>
